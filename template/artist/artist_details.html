{% extends "partial/base.html" %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/artist.css' %}">
{% endblock extra_css %}

{% block content %}

<section class="artist-section">

<h1 class="page-title">Artists</h1>

<div class="artist-search">
<input type="text" id="artistSearch" placeholder="Search artists...">
</div>

<div class="artist-grid">


<div class="artist-card card3d">

<img src="{{ artist.photo.url }}" alt="{{ artist.name }}">

<img src="{% static 'images/default_artist.png' %}">

<div class="artist-info">

<h3 class="artist-name">{{ artist.name }}</h3>

<p class="debut-year">
Debut Year: {{ artist.debut_year }}
</p>

</div>

</div>

</div>

</section>

{% block extra_js %}
<script src="{% static 'js/artist.js' %}"></script>
{% endblock extra_js %}


{% endblock %}
